              - column: { name: text, value: "Хуки нельзя вызывать внутри условий и циклов" }
              - column: { name: is_correct, valueBoolean: true }

        - insert:
            tableName: answer_options
            columns:
              - column:
                  name: question_id
                  valueComputed: "(SELECT id FROM questions WHERE text='React hooks rules')"
              - column: { name: text, value: "Хуки можно вызывать в циклах" }
              - column: { name: is_correct, valueBoolean: false }

        # ================= DOM =================

        - insert:
            tableName: answer_options
            columns:
