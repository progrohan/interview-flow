databaseChangeLog:

  - changeSet:
      id: 1-create-professions
      author: progrohan
      changes:
        - createTable:
            tableName: professions
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true

  - changeSet:
      id: 2-create-topics
      author: progrohan
      changes:
        - createTable:
            tableName: topics
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: profession_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_topics_profession
                    references: professions(id)
                    deleteCascade: true

  - changeSet:
      id: 3-create-questions
      author: progrohan
      changes:
        - createTable:
            tableName: questions
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: text
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: profession_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_questions_profession
                    references: professions(id)
                    deleteCascade: true
              - column:
                  name: topic_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_questions_topic
                    references: topics(id)
                    deleteCascade: true
              - column:
                  name: explanation
                  type: TEXT
              - column:
                  name: source_url
                  type: TEXT

  - changeSet:
      id: 4-create-answer-options
      author: progrohan
      changes:
        - createTable:
            tableName: answer_options
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: question_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_options_question
                    references: questions(id)
                    deleteCascade: true
              - column:
                  name: text
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: is_correct
                  type: BOOLEAN
                  constraints:
                    nullable: false

  - changeSet:
      id: 5-create-text-answer-rules
      author: progrohan
      changes:
        - createTable:
            tableName: text_answer_rules
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: question_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: keywords_json
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: min_matches
                  type: INT
                  defaultValueNumeric: 1
                  constraints:
                    nullable: false

  - changeSet:
      id: 6-create-users
      author: progrohan
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: enabled
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

  - changeSet:
      id: 7-insert-admin-user
      author: progrohan
      changes:
        - insert:
            tableName: users
            columns:
              - column:
                  name: name
                  value: "admin"
              - column:
                  name: password
                  value: "$2a$12$qY0lMM634W6tCr/x1GPojOmObNEdI3qAJ0M8niUgidBGS8nT3NK.C"
              - column:
                  name: role
                  value: "ROLE_ADMIN"
              - column:
                  name: enabled
                  valueBoolean: true
              - column:
                  name: created_at
                  valueComputed: CURRENT_TIMESTAMP

  - changeSet:
      id: 8-create-user-question-state
      author: progrohan

      changes:
        - createTable:
            tableName: user_question_state
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_user_question_state

              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: question_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: state
                  type: VARCHAR(32)
                  constraints:
                    nullable: false

              - column:
                  name: repetitions
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false

              - column:
                  name: interval_days
                  type: INT
                  defaultValueNumeric: 1
                  constraints:
                    nullable: false

              - column:
                  name: ease_factor
                  type: DOUBLE PRECISION
                  defaultValueNumeric: 2.5
                  constraints:
                    nullable: false

              - column:
                  name: lapses
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false

              - column:
                  name: next_review_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: last_review_at
                  type: TIMESTAMP

              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - addUniqueConstraint:
            tableName: user_question_state
            columnNames: user_id, question_id
            constraintName: uq_user_question_state_user_question

        - addForeignKeyConstraint:
            baseTableName: user_question_state
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_user_question_state_user
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: user_question_state
            baseColumnNames: question_id
            referencedTableName: questions
            referencedColumnNames: id
            constraintName: fk_user_question_state_question
            onDelete: CASCADE

