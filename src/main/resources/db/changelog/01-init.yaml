        - insert:
            tableName: answer_options
            columns:
              - column:
                  name: question_id
                  valueComputed: "(SELECT id FROM questions WHERE text='typeof null')"
              - column: { name: text, value: undefined }
              - column: { name: is_correct, valueBoolean: false }

        # ---- [] == false ----
        - insert:
            tableName: answer_options
            columns:
              - column:
                  name: question_id
