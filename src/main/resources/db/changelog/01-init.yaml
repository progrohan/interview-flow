databaseChangeLog:
  - changeSet:
      id: 1-create-professions
      author: progrohan
      changes:
        - createTable:
            tableName: professions
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true
  - changeSet:
      id: 2-create-topics
      author: progrohan
      changes:
        - createTable:
            tableName: topics
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: profession_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_topics_profession
                    references: professions(id)
                    deleteCascade: true

  - changeSet:
      id: 3-create-questions
      author: progrohan
      changes:
        - createTable:
            tableName: questions
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: text
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: profession_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_questions_profession
                    references: professions(id)
                    deleteCascade: true
              - column:
                  name: topic_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_questions_topic
                    references: topics(id)
                    deleteCascade: true
              - column:
                  name: explanation
                  type: TEXT
              - column:
                  name: source_url
                  type: TEXT

  - changeSet:
      id: 4-create-answer-options
      author: progrohan
      changes:
        - createTable:
            tableName: answer_options
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: question_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_options_question
                    references: questions(id)
                    deleteCascade: true
              - column:
                  name: text
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: is_correct
                  type: BOOLEAN
                  constraints:
                    nullable: false

  - changeSet:
      id: 5-create-text-answer-rules
      author: progrohan
      changes:
        - createTable:
            tableName: text_answer_rules
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_text_answer_rules
                    nullable: false
              - column:
                  name: question_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    unique: true
                    foreignKeyName: fk_text_answer_rules_question
                    references: questions(id)
                    deleteCascade: true
              - column:
                  name: keywords_json
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: min_matches
                  type: INT
                  defaultValueNumeric: 1
                  constraints:
                      nullable: false

  - changeSet:
      id: 6-create-users-table
      author: progrohan
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: enabled
                  type: BOOLEAN
                  defaultValueComputed: true
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
  - changeSet:
      id: 7-insert-admin-user
      author: progrohan
      changes:
        - insert:
            tableName: users
            columns:
              - column:
                  name: name
                  value: admin
              - column:
                  name: password
                  value: "$2a$12$qY0lMM634W6tCr/x1GPojOmObNEdI3qAJ0M8niUgidBGS8nT3NK.C"
              - column:
                  name: role
                  value: ROLE_ADMIN
              - column:
                  name: enabled
                  valueBoolean: true
              - column:
                  name: created_at
                  valueComputed: CURRENT_TIMESTAMP

  - changeSet:
      id: 1-seed-professions
      author: progrohan
      changes:
        - insert:
            tableName: professions
            columns:
              - column:
                  name: id
                  valueNumeric: 1
              - column:
                  name: name
                  value: Frontend-разработчик

