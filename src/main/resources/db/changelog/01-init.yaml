              - column: { name: text, value: object }
              - column: { name: is_correct, valueBoolean: true }

        - insert:
            tableName: answer_options
            columns:
              - column:
                  name: question_id
                  valueComputed: "(SELECT id FROM questions WHERE text='typeof null')"
              - column: { name: text, value: "null" }
