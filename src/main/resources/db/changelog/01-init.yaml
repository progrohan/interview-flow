              - column: { name: type, value: TEXT }
              - column: { name: profession_id, valueComputed: "(SELECT id FROM professions WHERE name='Frontend-разработчик')" }
              - column: { name: topic_id, valueComputed: "(SELECT id FROM topics WHERE name='Инструменты')" }

