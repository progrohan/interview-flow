databaseChangeLog:

  - changeSet:
      id: 1-create-professions
      author: progrohan
      changes:
        - createTable:
            tableName: professions
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true

  - changeSet:
      id: 2-create-topics
      author: progrohan
      changes:
        - createTable:
            tableName: topics
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: profession_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_topics_profession
                    references: professions(id)
                    deleteCascade: true

  - changeSet:
      id: 3-create-questions
      author: progrohan
      changes:
        - createTable:
            tableName: questions
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: text
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: profession_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_questions_profession
                    references: professions(id)
                    deleteCascade: true
              - column:
                  name: topic_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_questions_topic
                    references: topics(id)
                    deleteCascade: true
              - column:
                  name: explanation
                  type: TEXT
              - column:
                  name: source_url
                  type: TEXT

  - changeSet:
      id: 4-create-answer-options
      author: progrohan
      changes:
        - createTable:
            tableName: answer_options
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: question_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_options_question
                    references: questions(id)
                    deleteCascade: true
              - column:
                  name: text
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: is_correct
                  type: BOOLEAN
                  constraints:
                    nullable: false

  - changeSet:
      id: 5-create-text-answer-rules
      author: progrohan
      changes:
        - createTable:
            tableName: text_answer_rules
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: question_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: keywords_json
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: min_matches
                  type: INT
                  defaultValueNumeric: 1
                  constraints:
                    nullable: false

  - changeSet:
      id: 6-create-users
      author: progrohan
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: enabled
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

  - changeSet:
      id: 7-insert-admin-user
      author: progrohan
      changes:
        - insert:
            tableName: users
            columns:
              - column:
                  name: name
                  value: "admin"
              - column:
                  name: password
                  value: "$2a$12$qY0lMM634W6tCr/x1GPojOmObNEdI3qAJ0M8niUgidBGS8nT3NK.C"
              - column:
                  name: role
                  value: "ROLE_ADMIN"
              - column:
                  name: enabled
                  valueBoolean: true
              - column:
                  name: created_at
                  valueComputed: CURRENT_TIMESTAMP

  - changeSet:
      id: 1-seed-professions
      author: progrohan
      changes:
        - insert:
            tableName: professions
            columns:
              - column: { name: id, valueNumeric: 1 }
              - column: { name: name, value: "Frontend-разработчик" }

  - changeSet:
      id: 2-seed-topics
      author: progrohan
      changes:
        - insert:
            tableName: topics
            columns:
              - column: { name: id, valueNumeric: 1 }
              - column: { name: name, value: "Основы JavaScript" }
              - column: { name: profession_id, valueNumeric: 1 }
        - insert:
            tableName: topics
            columns:
              - column: { name: id, valueNumeric: 2 }
              - column: { name: name, value: "Асинхронность" }
              - column: { name: profession_id, valueNumeric: 1 }
        - insert:
            tableName: topics
            columns:
              - column: { name: id, valueNumeric: 3 }
              - column: { name: name, value: "React" }
              - column: { name: profession_id, valueNumeric: 1 }
        - insert:
            tableName: topics
            columns:
              - column: { name: id, valueNumeric: 4 }
              - column: { name: name, value: "Работа с DOM и браузером" }
              - column: { name: profession_id, valueNumeric: 1 }
        - insert:
            tableName: topics
            columns:
              - column: { name: id, valueNumeric: 5 }
              - column: { name: name, value: "Инструменты" }
              - column: { name: profession_id, valueNumeric: 1 }
        - insert:
            tableName: topics
            columns:
              - column: { name: id, valueNumeric: 6 }
              - column: { name: name, value: "Типизация / TypeScript" }
              - column: { name: profession_id, valueNumeric: 1 }

  - changeSet:
      id: 3-seed-questions
      author: progrohan
      changes:
        # Тема 1: Основы JavaScript
        - insert:
            tableName: questions
            columns:
              - column: { name: id, valueNumeric: 1 }
              - column: { name: text, value: "Каким будет результат console.log(typeof null)?" }
              - column: { name: type, value: "SINGLE" }
              - column: { name: profession_id, valueNumeric: 1 }
              - column: { name: topic_id, valueNumeric: 1 }
        - insert:
            tableName: questions
            columns:
              - column: { name: id, valueNumeric: 4 }
              - column: { name: text, value: "Какие из перечисленных значений являются ложными (falsy) в JavaScript?" }
              - column: { name: type, value: "MULTIPLE" }
              - column: { name: profession_id, valueNumeric: 1 }
              - column: { name: topic_id, valueNumeric: 1 }
        - insert:
            tableName: questions
            columns:
              - column: { name: id, valueNumeric: 6 }
              - column: { name: text, value: "Назовите тип данных, который используется для хранения уникальных значений, появившийся в ES6." }
              - column: { name: type, value: "TEXT" }
              - column: { name: profession_id, valueNumeric: 1 }
              - column: { name: topic_id, valueNumeric: 1 }

        # Тема 2: Асинхронность
        - insert:
            tableName: questions
            columns:
              - column: { name: id, valueNumeric: 9 }
              - column: { name: text, value: "Каков будет порядок вывода? console.log('1'); setTimeout(() => console.log('2'), 0); Promise.resolve().then(() => console.log('3')); console.log('4');" }
              - column: { name: type, value: "SINGLE" }
              - column: { name: profession_id, valueNumeric: 1 }
              - column: { name: topic_id, valueNumeric: 2 }
        - insert:
            tableName: questions
            columns:
              - column: { name: id, valueNumeric: 12 }
              - column: { name: text, value: "Назовите метод Promise, который выполняется, когда все переданные промисы завершены (resolved или rejected)." }
              - column: { name: type, value: "TEXT" }
              - column: { name: profession_id, valueNumeric: 1 }
              - column: { name: topic_id, valueNumeric: 2 }

        # Тема 3: React
        - insert:
            tableName: questions
            columns:
              - column: { name: id, valueNumeric: 14 }
              - column: { name: text, value: "Какой хук используется для выполнения побочных эффектов в функциональном компоненте?" }
              - column: { name: type, value: "SINGLE" }
              - column: { name: profession_id, valueNumeric: 1 }
              - column: { name: topic_id, valueNumeric: 3 }
        - insert:
            tableName: questions
            columns:
              - column: { name: id, valueNumeric: 17 }
              - column: { name: text, value: "Какие хуки относятся к встроенным хукам React?" }
              - column: { name: type, value: "MULTIPLE" }
              - column: { name: profession_id, valueNumeric: 1 }
              - column: { name: topic_id, valueNumeric: 3 }
        - insert:
            tableName: questions
            columns:
              - column: { name: id, valueNumeric: 20 }
              - column: { name: text, value: "Как называется синтаксическое расширение JavaScript, которое позволяет писать HTML-подобный код внутри React-компонентов?" }
              - column: { name: type, value: "TEXT" }
              - column: { name: profession_id, valueNumeric: 1 }
              - column: { name: topic_id, valueNumeric: 3 }

        # Тема 4: DOM и браузер
        - insert:
            tableName: questions
            columns:
              - column: { name: id, valueNumeric: 22 }
              - column: { name: text, value: "Что выведет console.log(document.getElementById('test').innerHTML) если элемент с id='test' не найден?" }
              - column: { name: type, value: "SINGLE" }
              - column: { name: profession_id, valueNumeric: 1 }
              - column: { name: topic_id, valueNumeric: 4 }
        - insert:
            tableName: questions
            columns:
              - column: { name: id, valueNumeric: 25 }
              - column: { name: text, value: "Назовите свойство объекта event, которое содержит элемент, на котором событие было изначально вызвано." }
              - column: { name: type, value: "TEXT" }
              - column: { name: profession_id, valueNumeric: 1 }
              - column: { name: topic_id, valueNumeric: 4 }

        # Тема 5: Инструменты
        - insert:
            tableName: questions
            columns:
              - column: { name: id, valueNumeric: 26 }
              - column: { name: text, value: "Какой командой Git можно изменить последний коммит, не создавая новый?" }
              - column: { name: type, value: "SINGLE" }
              - column: { name: profession_id, valueNumeric: 1 }
              - column: { name: topic_id, valueNumeric: 5 }
        - insert:
            tableName: questions
            columns:
              - column: { name: id, valueNumeric: 27 }
              - column: { name: text, value: "Назовите файл, который является точкой входа для npm-пакета и описывает его зависимости." }
              - column: { name: type, value: "TEXT" }
              - column: { name: profession_id, valueNumeric: 1 }
              - column: { name: topic_id, valueNumeric: 5 }

        # Тема 6: TypeScript
        - insert:
            tableName: questions
            columns:
              - column: { name: id, valueNumeric: 29 }
              - column: { name: text, value: "Какой тип в TypeScript означает, что переменная может быть любого типа и компилятор отключает проверки?" }
              - column: { name: type, value: "SINGLE" }
              - column: { name: profession_id, valueNumeric: 1 }
              - column: { name: topic_id, valueNumeric: 6 }
        - insert:
            tableName: questions
            columns:
              - column: { name: id, valueNumeric: 30 }
              - column: { name: text, value: "Назовите оператор TypeScript, который используется для объединения типов (например, переменная может быть строкой ИЛИ числом)." }
              - column: { name: type, value: "TEXT" }
              - column: { name: profession_id, valueNumeric: 1 }
              - column: { name: topic_id, valueNumeric: 6 }

  - changeSet:
      id: 4-seed-answer-options
      author: progrohan
      changes:
        # ========== Q1 (SINGLE) ==========
        - insert:
            tableName: answer_options
            columns:
              - column: { name: question_id, valueNumeric: 1 }
              - column: { name: text, value: "null" }
              - column: { name: is_correct, valueBoolean: false }
        - insert:
            tableName: answer_options
            columns:
              - column: { name: question_id, valueNumeric: 1 }
              - column: { name: text, value: "object" }
              - column: { name: is_correct, valueBoolean: true }
        - insert:
            tableName: answer_options
            columns:
              - column: { name: question_id, valueNumeric: 1 }
              - column: { name: text, value: "undefined" }
              - column: { name: is_correct, valueBoolean: false }
        - insert:
            tableName: answer_options
            columns:
              - column: { name: question_id, valueNumeric: 1 }
              - column: { name: text, value: "number" }
              - column: { name: is_correct, valueBoolean: false }

        # ========== Q4 (MULTIPLE - falsy values) ==========
        - insert:
            tableName: answer_options
            columns:
              - column: { name: question_id, valueNumeric: 4 }
              - column: { name: text, value: "0" }
              - column: { name: is_correct, valueBoolean: true }
        - insert:
            tableName: answer_options
            columns:
              - column: { name: question_id, valueNumeric: 4 }
              - column: { name: text, value: "\"\" (пустая строка)" }
              - column: { name: is_correct, valueBoolean: true }
        - insert:
            tableName: answer_options
            columns:
              - column: { name: question_id, valueNumeric: 4 }
              - column: { name: text, value: "[]" }
              - column: { name: is_correct, valueBoolean: false }
        - insert:
            tableName: answer_options
            columns:
              - column: { name: question_id, valueNumeric: 4 }
              - column: { name: text, value: "null" }
              - column: { name: is_correct, valueBoolean: true }
        - insert:
            tableName: answer_options
            columns:
              - column: { name: question_id, valueNumeric: 4 }
              - column: { name: text, value: "{}" }
              - column: { name: is_correct, valueBoolean: false }
        - insert:
            tableName: answer_options
            columns:
              - column: { name: question_id, valueNumeric: 4 }
              - column: { name: text, value: "undefined" }
              - column: { name: is_correct, valueBoolean: true }

        # ========== Q9 (SINGLE - Event Loop order) ==========
        - insert:
            tableName: answer_options
            columns:
              - column: { name: question_id, valueNumeric: 9 }
              - column: { name: text, value: "1, 2, 3, 4" }
              - column: { name: is_correct, valueBoolean: false }
        - insert:
            tableName: answer_options
            columns:
              - column: { name: question_id, valueNumeric: 9 }
              - column: { name: text, value: "1, 4, 3, 2" }
              - column: { name: is_correct, valueBoolean: true }
        - insert:
            tableName: answer_options
            columns:
              - column: { name: question_id, valueNumeric: 9 }
              - column: { name: text, value: "1, 4, 2, 3" }
              - column: { name: is_correct, valueBoolean: false }
        - insert:
            tableName: answer_options
            columns:
              - column: { name: question_id, valueNumeric: 9 }
              - column: { name: text, value: "1, 3, 4, 2" }
              - column: { name: is_correct, valueBoolean: false }

        # ========== Q14 (SINGLE - useEffect) ==========
        - insert:
            tableName: answer_options
            columns:
              - column: { name: question_id, valueNumeric: 14 }
              - column: { name: text, value: "useState" }
              - column: { name: is_correct, valueBoolean: false }
        - insert:
            tableName: answer_options
            columns:
              - column: { name: question_id, valueNumeric: 14 }
              - column: { name: text, value: "useContext" }
              - column: { name: is_correct, valueBoolean: false }
        - insert:
            tableName: answer_options
            columns:
              - column: { name: question_id, valueNumeric: 14 }
