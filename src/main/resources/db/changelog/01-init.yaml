        - insert:
            tableName: topics
            columns:
              - column: { name: name, value: Асинхронность }
              - column:
                  name: profession_id
                  valueComputed: "(SELECT id FROM professions WHERE name='Frontend-разработчик')"

        - insert:
            tableName: topics
            columns:
              - column: { name: name, value: React }
              - column:
                  name: profession_id
                  valueComputed: "(SELECT id FROM professions WHERE name='Frontend-разработчик')"

        - insert:
            tableName: topics
            columns:
              - column: { name: name, value: DOM }
              - column:
                  name: profession_id
                  valueComputed: "(SELECT id FROM professions WHERE name='Frontend-разработчик')"

        - insert:
            tableName: topics
            columns:
              - column: { name: name, value: Инструменты }
              - column:
                  name: profession_id
                  valueComputed: "(SELECT id FROM professions WHERE name='Frontend-разработчик')"

        - insert:
            tableName: topics
            columns:
              - column: { name: name, value: TypeScript }
              - column:
                  name: profession_id
                  valueComputed: "(SELECT id FROM professions WHERE name='Frontend-разработчик')"

