  - changeSet:
      id: 5-seed-text-answer-rules
      author: progrohan
      changes:
        # Q6: тип данных для уникальных значений
        - insert:
            tableName: text_answer_rules
            columns:
              - column: { name: question_id, valueNumeric: 6 }
              - column: { name: keywords_json, value: '["Set", "set", "SET"]' }
              - column: { name: min_matches, valueNumeric: 1 }

        # Q12: метод Promise.allSettled
        - insert:
            tableName: text_answer_rules
            columns:
              - column: { name: question_id, valueNumeric: 12 }
              - column: { name: keywords_json, value: '["allSettled", "allSettled()", "Promise.allSettled"]' }
              - column: { name: min_matches, valueNumeric: 1 }

        # Q20: JSX
        - insert:
            tableName: text_answer_rules
            columns:
              - column: { name: question_id, valueNumeric: 20 }
              - column: { name: keywords_json, value: '["JSX", "jsx", "JSX (JavaScript XML)"]' }
              - column: { name: min_matches, valueNumeric: 1 }

        # Q25: event.target
        - insert:
            tableName: text_answer_rules
            columns:
              - column: { name: question_id, valueNumeric: 25 }
              - column: { name: keywords_json, value: '["target", "event.target", "Event.target", ".target"]' }
              - column: { name: min_matches, valueNumeric: 1 }

        # Q27: package.json
        - insert:
            tableName: text_answer_rules
            columns:
              - column: { name: question_id, valueNumeric: 27 }
              - column: { name: keywords_json, value: '["package.json", "package", "package json"]' }
              - column: { name: min_matches, valueNumeric: 1 }

        # Q30: union types (|)
        - insert:
            tableName: text_answer_rules
            columns:
              - column: { name: question_id, valueNumeric: 30 }
              - column: { name: keywords_json, value: '["union", "union type", "|", "вертикальная черта"]' }
              - column: { name: min_matches, valueNumeric: 1 }